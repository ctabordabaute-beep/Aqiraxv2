  <script>
    // ============================================================
    //  ESTRELLAS CAYENDO
    // ============================================================
    (function() {
      const canvas = document.getElementById('star-canvas');
      const ctx = canvas.getContext('2d');
      let w, h;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      const stars = [];
      const MAX_STARS = 180;

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function createStar() {
        return {
          x: random(0, w),
          y: random(-h, 0),
          size: random(1, 3.5),
          speed: random(0.5, 4.5),
          opacity: random(0.3, 0.9),
          twinkle: random(0.5, 1.5)
        };
      }

      for (let i = 0; i < MAX_STARS; i++) {
        stars.push(createStar());
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        
        const gradient = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
        gradient.addColorStop(0, '#0f0f0f');
        gradient.addColorStop(1, '#050505');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);

        const time = Date.now() * 0.001;

        for (let s of stars) {
          s.y += s.speed * 0.5;

          if (s.y > h + 10) {
            s.x = random(0, w);
            s.y = random(-40, -10);
            s.size = random(1, 3.5);
            s.speed = random(0.5, 4.5);
            s.opacity = random(0.3, 0.9);
          }

          const twinkle = Math.sin(time * 1.5 + s.x * 0.1) * 0.2 + 0.8;
          const alpha = s.opacity * twinkle;

          const gradient2 = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 2);
          gradient2.addColorStop(0, `rgba(255, 255, 255, ${alpha * 0.3})`);
          gradient2.addColorStop(1, 'rgba(255, 255, 255, 0)');
          ctx.fillStyle = gradient2;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * 2, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
          ctx.fill();

          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * 0.2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
          ctx.fill();

          if (s.speed > 1.2) {
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x + random(-1, 1), s.y - s.speed * 2.5);
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.08})`;
            ctx.lineWidth = s.size * 0.3;
            ctx.stroke();
          }
        }

        requestAnimationFrame(draw);
      }

      draw();
    })();

    // ============================================================
    //  ACTUALIZACIÓN AUTOMÁTICA DEL EMBED
    // ============================================================
    (function() {
      const now = new Date();
      const isoString = now.toISOString().replace('Z', '+00:00');
      
      let metaUpdated = document.querySelector('meta[property="og:updated_time"]');
      if (!metaUpdated) {
        metaUpdated = document.createElement('meta');
        metaUpdated.setAttribute('property', 'og:updated_time');
        document.head.appendChild(metaUpdated);
      }
      metaUpdated.setAttribute('content', isoString);

      // Si usas imagen de Imgur, NO necesitas el timestamp automático
      // porque la URL ya es fija. Si quieres forzar actualización,
      // añade ?v=2 manualmente en la URL de la imagen.
    })();
